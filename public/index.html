<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVALOS PROPIEDADES | Inmobiliaria Premium</title>
    <meta name="description" content="Encuentra tu proximo hogar con DAVALOS PROPIEDADES. Venta y alquiler de propiedades exclusivas.">
    <meta property="og:title" content="DAVALOS PROPIEDADES | Inmobiliaria Premium">
    <meta property="og:description" content="Propiedades seleccionadas para venta y alquiler con atencion personalizada.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/images/logo-completo.png">
    <meta name="theme-color" content="#001556">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container container-header">
            <a href="index.html" class="logo">
                <img src="assets/images/logo-simple.png" alt="Logo" class="logo-img-sm">
                <img src="assets/images/logo-texto.png" alt="DAVALOS PROPIEDADES" class="logo-img-txt">
            </a>
            <nav class="nav">
                <a href="#inicio" class="nav-link active">Inicio</a>
                <a href="#propiedades" class="nav-link">Propiedades</a>
                <a href="admin/" class="btn btn-outline">Panel admin</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="inicio" class="hero">
            <div class="container hero-content">
                <h1 class="hero-title">Encuentra el lugar <br><span class="highlight">donde quieres vivir</span></h1>
                <p class="hero-subtitle">Propiedades exclusivas seleccionadas para tu confort y estilo de vida.</p>
                <div class="filter-bar">
                    <div class="filter-group filter-group-wide">
                        <label for="search-input">Buscar</label>
                        <input id="search-input" type="text" placeholder="Titulo o descripcion">
                    </div>
                    <div class="filter-group">
                        <label for="filter-type">Operacion</label>
                        <select id="filter-type">
                            <option value="todos">Todos</option>
                            <option value="venta">Venta</option>
                            <option value="alquiler">Alquiler</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filter-rooms">Ambientes</label>
                        <select id="filter-rooms">
                            <option value="0">Todos</option>
                            <option value="1">1+</option>
                            <option value="2">2+</option>
                            <option value="3">3+</option>
                            <option value="4">4+</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filter-price-min">Precio min</label>
                        <input id="filter-price-min" type="number" min="0" step="100" placeholder="0">
                    </div>
                    <div class="filter-group">
                        <label for="filter-price-max">Precio max</label>
                        <input id="filter-price-max" type="number" min="0" step="100" placeholder="Sin tope">
                    </div>
                    <div class="filter-group">
                        <label for="sort-by">Orden</label>
                        <select id="sort-by">
                            <option value="recent">Mas recientes</option>
                            <option value="price-asc">Precio menor</option>
                            <option value="price-desc">Precio mayor</option>
                            <option value="area-desc">Mayor superficie</option>
                        </select>
                    </div>
                    <button id="clear-filters" class="btn btn-outline btn-small" type="button">Limpiar</button>
                </div>
            </div>
        </section>

        <section id="propiedades" class="properties">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Propiedades destacadas</h2>
                    <p class="section-subtitle">Explora nuestras ultimas captaciones</p>
                    <p id="results-count" class="results-count"></p>
                </div>
                <div id="properties-grid" class="properties-grid">
                    <div class="loader">Cargando propiedades...</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <img src="assets/images/logo-completo.png" alt="DAVALOS PROPIEDADES" class="logo-img logo-footer">
            <p>&copy; 2026 DAVALOS PROPIEDADES. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
